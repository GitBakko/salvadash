name: PR Quality Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─── PR Validation ────────────────────────────────────────
  validate:
    name: ✅ PR Checks
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

      - name: Check for merge conflicts
        run: |
          git fetch origin main
          if ! git merge-tree $(git merge-base HEAD origin/main) HEAD origin/main | grep -q "^<<<<<<<"; then
            echo "✅ No merge conflicts"
          else
            echo "❌ Merge conflicts detected"
            exit 1
          fi

  # ─── Changed Files Analysis ───────────────────────────────
  changes:
    name: 📋 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      shared: ${{ steps.filter.outputs.shared }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'shared/**'
            frontend:
              - 'frontend/**'
              - 'shared/**'
            shared:
              - 'shared/**'
            db:
              - 'backend/prisma/schema.prisma'

  # ─── Schema Drift Check ──────────────────────────────────
  schema-check:
    name: 🗃️ Schema Check
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.db == 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: salvadash_test
          POSTGRES_USER: salvadash
          POSTGRES_PASSWORD: salvadash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U salvadash"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://salvadash:salvadash_test@localhost:5432/salvadash_test?schema=public'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate

      - name: Verify schema can be applied
        run: pnpm --filter backend exec prisma db push --accept-data-loss

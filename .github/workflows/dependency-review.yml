name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: 🔒 Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          # `deny-licenses` is deprecated (actions/dependency-review-action#997);
          # the recommended approach is an explicit allow-list of acceptable
          # (permissive) licenses, which inherently blocks strong copyleft
          # (GPL/AGPL/etc.). Add a license here when a new, vetted dependency
          # legitimately needs one.
          allow-licenses: >-
            MIT, MIT-0, ISC, Apache-2.0, 0BSD, BSD-2-Clause, BSD-3-Clause,
            BlueOak-1.0.0, CC0-1.0, CC-BY-4.0, CC-BY-3.0, Unlicense, Python-2.0,
            Zlib, WTFPL, Artistic-2.0, MPL-2.0
          # jszip (transitive via exceljs) is dual-licensed "MIT OR GPL-3.0"; the
          # MIT disjunct satisfies the allow-list, but keep it pinned explicitly.
          allow-dependencies-licenses: pkg:npm/jszip
